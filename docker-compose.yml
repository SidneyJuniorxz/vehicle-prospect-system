services:
  db:
    image: postgres:17
    container_name: vehicle_prospect_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vehicle_prospect}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-4263}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vehicle_prospect}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vehicle_prospect_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DEPLOYMENT_MODE: self-hosted
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-4263}@db:5432/${POSTGRES_DB:-vehicle_prospect}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: vehicle_prospect_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-8080}:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
